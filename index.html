<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discover Diakopto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="panel hero" aria-label="Hero section">
        <div class="content">
          <h1 class="hero-title">
            <span>D</span><span>I</span><span>S</span><span>C</span><span>O</span><span>V</span><span>E</span><span>R</span><br />
            <span>D</span><span>I</span><span>A</span><span>K</span><span>O</span><span>P</span><span>T</span><span>O</span>
          </h1>
        </div>
      </section>

      <section class="panel odontotos" aria-label="Odontotos Railway section">
        <div class="content">
          <h2>Odontotos Railway</h2>
          <p>A journey carved into the mountain.</p>
          <a href="#">→ Explore</a>
        </div>
      </section>

      <section class="panel gorge" aria-label="Vouraikos Gorge section">
        <div class="content">
          <h2>Vouraikos Gorge</h2>
          <p>Where silence becomes landscape.</p>
          <a href="#">→ Explore</a>
        </div>
      </section>

      <section class="panel beaches" aria-label="Beaches section">
        <div class="content">
          <h2>Beaches</h2>
          <p>Light, salt, and slow time.</p>
          <a href="#">→ Explore</a>
        </div>
      </section>

      <section class="panel local" aria-label="Local Life section">
        <div class="content">
          <h2>Local Life</h2>
          <p>Moments that don't try too hard.</p>
          <a href="#">→ Explore</a>
        </div>
      </section>

      <section class="panel outro" aria-label="Outro section">
        <div class="content">
          <h2>Diakopto isn't a place.</h2>
          <p>It's a pause.</p>
        </div>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
